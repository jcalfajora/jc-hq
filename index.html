.header-right{display:flex;align-items:center;gap:14px}
.clock{font-size:13px;color:#64748b;font-weight:500;font-variant-numeric:tabular-nums}
.day-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:0.3px}

.weekend{background:#1a1a0f;color:#fbbf24;border:1px solid #3d3500}

const NEWS_POOL=[

];

let accessToken = null;
let data = loadData();
let gcalEvents = [];
let editingSlot = null;
let activeNewsIndices = [];

function loadData(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}
  return {events:{},priorities:[],rituals:{},tasks:[],notes:'',lastReset:null,newsIndices:[]};

function getManilaTime(){return new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));}

/* ─── AUTH ─────────────────────────────────────────────── */
function handleSignIn(){
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if(resp.error){showToast('Sign-in failed: '+resp.error,'error');return;}
      accessToken = resp.access_token;
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('main-app').style.display='block';
      init();
    }
  });
  client.requestAccessToken();
}

function handleSignOut(){
  accessToken = null;
  document.getElementById('main-app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

/* ─── GOOGLE CALENDAR API ──────────────────────────────── */
async function fetchGcalEvents(){
  if(!accessToken)return;
  try{
    const now = getManilaTime();
    const y=now.getFullYear(),mo=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
    const start=`${y}-${mo}-${d}T00:00:00+08:00`;
    const end=`${y}-${mo}-${d}T23:59:59+08:00`;
    const url=`${CALENDAR_API}/calendars/primary/events?timeMin=${encodeURIComponent(start)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&timeZone=${encodeURIComponent(TZ)}`;
    const res=await fetch(url,{headers:{Authorization:`Bearer ${accessToken}`}});
    if(!res.ok)throw new Error('Calendar fetch failed');
    const json=await res.json();
    gcalEvents=(json.items||[]).filter(e=>e.start&&(e.start.dateTime||e.start.date)).map(e=>{
      const s=new Date(e.start.dateTime||e.start.date);
      const en=new Date(e.end.dateTime||e.end.date);
      return {
        id:e.id,title:e.summary||'(No title)',
        startH:s.getHours(),startM:s.getMinutes(),
        endH:en.getHours(),endM:en.getMinutes()
      };
    });
    document.getElementById('gcal-status').textContent='✓ Google Calendar synced';
    buildCalendar();updateBriefing();
  }catch(err){
    document.getElementById('gcal-status').textContent='⚠ Calendar sync error';
    console.error(err);
  }
}

async function createGcalEvent(key,title){
  if(!accessToken)return;
  const ind=document.getElementById('sync-indicator');
  ind.innerHTML='<span class="sync-spinner"></span>';
  try{
    const now=getManilaTime();
    const [hStr,rest]=key.split(':');const h=parseInt(hStr);const m=parseInt(rest);
    const y=now.getFullYear();const mo=String(now.getMonth()+1).padStart(2,'0');const d=String(now.getDate()).padStart(2,'0');
    const sH=String(h).padStart(2,'0');const sM=String(m).padStart(2,'0');
    const eTotal=h*60+m+30;const eH=String(Math.floor(eTotal/60)).padStart(2,'0');const eM=String(eTotal%60).padStart(2,'0');
    const body={
      summary:title,
      start:{dateTime:`${y}-${mo}-${d}T${sH}:${sM}:00+08:00`,timeZone:TZ},
      end:{dateTime:`${y}-${mo}-${d}T${eH}:${eM}:00+08:00`,timeZone:TZ}
    };
    const res=await fetch(`${CALENDAR_API}/calendars/primary/events`,{
      method:'POST',
      headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok)throw new Error('Create failed');
    ind.innerHTML='';
    showToast('✓ Added to Google Calendar','success');
    await fetchGcalEvents();
  }catch(err){
    ind.innerHTML='';
    showToast('Saved locally — sync error','error');
    console.error(err);
  }
}

async function deleteGcalEvent(eventId){
  if(!accessToken||!eventId)return;
  try{
    await fetch(`${CALENDAR_API}/calendars/primary/events/${eventId}`,{
      method:'DELETE',
      headers:{Authorization:`Bearer ${accessToken}`}
    });
    await fetchGcalEvents();
    showToast('Removed from Google Calendar','success');
  }catch(e){console.error(e);}
}

/* ─── CALENDAR UI ──────────────────────────────────────── */
function checkReset(){
  const now=getManilaTime();const today=`${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
  if(data.lastReset!==today&&now.getHours()>=5){
    const prev=data.events;data.events={};data.rituals={};data.lastReset=today;
    if(!data.archive)data.archive=[];
    data.archive.push({date:data.lastReset,events:prev});
    if(data.archive.length>30)data.archive=data.archive.slice(-30);
    saveData();
  }
}

function formatTime(h,m){const hh=h%12||12;const ap=h<12?'AM':'PM';return `${hh}:${m===0?'00':'30'}${ap}`;}
function slotKey(h,m){return `${h}:${m===0?'00':'30'}`;}

function getGcalForSlot(h,m){
  const ss=h*60+m,se=ss+30;
  return gcalEvents.filter(e=>{const es=e.startH*60+e.startM,ee=e.endH*60+e.endM;return es<se&&ee>ss;});
}

function buildCalendar(){
  const cal=document.getElementById('calendar');cal.innerHTML='';
  const now=getManilaTime();const curH=now.getHours(),curM=now.getMinutes();
  for(let h=5;h<=23;h++){
    for(let m=0;m<60;m+=30){
      if(h===23&&m===30)continue;
      const key=slotKey(h,m);
      const isCurrent=(h===curH&&(m===0?curM<30:curM>=30));
      const hasEvent=!!data.events[key];
      const gcalMatch=getGcalForSlot(h,m);const hasGcal=gcalMatch.length>0;
      const row=document.createElement('div');
      row.className='time-slot'+(hasGcal?' gcal-event':hasEvent?' has-event':'')+(isCurrent?' current-hour':'');
      const timeEl=document.createElement('div');timeEl.className='slot-time';timeEl.textContent=formatTime(h,m);
      if(isCurrent){const d=document.createElement('span');d.className='current-time-label';d.textContent='now';timeEl.appendChild(d);}
      const contentEl=document.createElement('div');contentEl.className='slot-content';
      if(hasGcal){
        const dot=document.createElement('div');dot.className='gcal-dot';
        const txt=document.createElement('div');txt.className='gcal-text';txt.textContent=gcalMatch.map(e=>e.title).join(' · ');
        contentEl.appendChild(dot);contentEl.appendChild(txt);
      } else if(editingSlot===key){
        const inp=document.createElement('input');inp.className='slot-input';inp.type='text';
        inp.value=data.events[key]||'';inp.placeholder='Block title...';
        inp.addEventListener('keydown',e=>{
          if(e.key==='Enter')saveSlot(key,inp.value);
          if(e.key==='Escape'){editingSlot=null;buildCalendar();}
        });
        inp.addEventListener('blur',()=>{setTimeout(()=>{if(editingSlot===key)saveSlot(key,inp.value);},200);});
        contentEl.appendChild(inp);row.classList.add('editing');setTimeout(()=>inp.focus(),10);
      } else if(hasEvent){
        const eventData=data.events[key];
        const title=typeof eventData==='object'?eventData.title:eventData;
        const gcalId=typeof eventData==='object'?eventData.gcalId:null;
        const txt=document.createElement('div');txt.className='event-text';txt.textContent=title;
        const rem=document.createElement('button');rem.className='remove-btn';rem.textContent='Remove';
        rem.onclick=e=>{
          e.stopPropagation();
          if(gcalId)deleteGcalEvent(gcalId);
          delete data.events[key];saveData();buildCalendar();updateBriefing();
        };
        contentEl.appendChild(txt);contentEl.appendChild(rem);
        row.onclick=()=>{editingSlot=key;buildCalendar();};
      } else {
        row.onclick=()=>{editingSlot=key;buildCalendar();};
      }
      row.appendChild(timeEl);row.appendChild(contentEl);cal.appendChild(row);
    }
  }
}

async function saveSlot(key,val){
  const trimmed=val.trim();
  editingSlot=null;
  if(trimmed){
    data.events[key]={title:trimmed,gcalId:null};
    saveData();buildCalendar();updateBriefing();
    const resp=await createGcalEventAndGetId(key,trimmed);
    if(resp){data.events[key].gcalId=resp;saveData();}
  } else {
    delete data.events[key];saveData();buildCalendar();updateBriefing();
  }
}

async function createGcalEventAndGetId(key,title){
  if(!accessToken)return null;
  const ind=document.getElementById('sync-indicator');
  ind.innerHTML='<span class="sync-spinner"></span>';
  try{
    const now=getManilaTime();
    const [hStr,rest]=key.split(':');const h=parseInt(hStr);const m=parseInt(rest);
    const y=now.getFullYear();const mo=String(now.getMonth()+1).padStart(2,'0');const d=String(now.getDate()).padStart(2,'0');
    const sH=String(h).padStart(2,'0');const sM=String(m).padStart(2,'0');
    const eTotal=h*60+m+30;const eH=String(Math.floor(eTotal/60)).padStart(2,'0');const eM=String(eTotal%60).padStart(2,'0');
    const body={
      summary:title,
      start:{dateTime:`${y}-${mo}-${d}T${sH}:${sM}:00+08:00`,timeZone:TZ},
      end:{dateTime:`${y}-${mo}-${d}T${eH}:${eM}:00+08:00`,timeZone:TZ}
    };
    const res=await fetch(`${CALENDAR_API}/calendars/primary/events`,{
      method:'POST',
      headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok)throw new Error('Create failed');
    const json=await res.json();
    ind.innerHTML='';
    showToast('✓ Synced to Google Calendar','success');
    await fetchGcalEvents();
    return json.id||null;
  }catch(err){
    ind.innerHTML='';showToast('Saved locally only','error');console.error(err);return null;
  }
}

/* ─── SIDEBAR COMPONENTS ───────────────────────────────── */
function buildPriorities(){
  const list=document.getElementById('priority-list');list.innerHTML='';
  if(!data.priorities.length){list.innerHTML='<div class="empty-state">No priorities set. What\'s the most important thing today?</div>';return;}
  data.priorities.forEach((p,i)=>{
    const row=document.createElement('div');row.className='priority-item';
    row.innerHTML=`<span class="priority-num">${i+1}</span><span style="flex:1">${p}</span><button class="icon-btn" onclick="removePriority(${i})">✕</button>`;
    list.appendChild(row);
  });
}
function addPriority(){
  const inp=document.getElementById('priority-input');const val=inp.value.trim();
  if(!val||data.priorities.length>=3)return;
  data.priorities.push(val);inp.value='';saveData();buildPriorities();updateBriefing();
}
function removePriority(i){data.priorities.splice(i,1);saveData();buildPriorities();updateBriefing();}
document.getElementById('priority-input').addEventListener('keydown',e=>{if(e.key==='Enter')addPriority();});

function buildRituals(){
  const list=document.getElementById('ritual-list');list.innerHTML='';
  RITUALS.forEach(r=>{
    const done=!!data.rituals[r];
    const row=document.createElement('div');row.className='ritual-item'+(done?' done':'');
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=done;cb.id='ritual_'+r;
    cb.addEventListener('change',()=>{data.rituals[r]=cb.checked;saveData();buildRituals();updateBriefing();});
    const lbl=document.createElement('label');lbl.htmlFor='ritual_'+r;lbl.textContent=r;
    row.appendChild(cb);row.appendChild(lbl);list.appendChild(row);
  });
}

function buildTasks(){
  const list=document.getElementById('task-list');list.innerHTML='';
  if(!data.tasks||!data.tasks.length){list.innerHTML='<div class="empty-state">Nothing queued.</div>';return;}
  data.tasks.forEach((t,i)=>{
    const row=document.createElement('div');row.className='task-item'+(t.done?' done':'');
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=!!t.done;cb.id='task_'+i;
    cb.addEventListener('change',()=>{data.tasks[i].done=cb.checked;saveData();buildTasks();updateBriefing();});
    const lbl=document.createElement('label');lbl.htmlFor='task_'+i;lbl.textContent=t.text;
    const rem=document.createElement('button');rem.className='icon-btn';rem.textContent='✕';
    rem.onclick=()=>{data.tasks.splice(i,1);saveData();buildTasks();updateBriefing();};
    row.appendChild(cb);row.appendChild(lbl);row.appendChild(rem);list.appendChild(row);
  });
}
function addTask(){
  const inp=document.getElementById('task-input');const val=inp.value.trim();
  if(!val)return;if(!data.tasks)data.tasks=[];
  data.tasks.push({text:val,done:false});inp.value='';saveData();buildTasks();updateBriefing();
}
document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

function initNotes(){
  const area=document.getElementById('notes-area');area.value=data.notes||'';
  area.addEventListener('input',()=>{
    clearTimeout(notesSaveTimer);
    notesSaveTimer=setTimeout(()=>{
      data.notes=area.value;saveData();
      const s=document.getElementById('notes-saved');s.classList.add('show');
      setTimeout(()=>s.classList.remove('show'),1500);
    },600);
  });
}

function refreshNews(){
  const s=[...Array(NEWS_POOL.length).keys()].sort(()=>Math.random()-0.5);
  activeNewsIndices=s.slice(0,4);data.newsIndices=activeNewsIndices;saveData();renderNews();
}
function renderNews(){
  const c=document.getElementById('news-container');c.innerHTML='';
  activeNewsIndices.forEach(i=>{
    const n=NEWS_POOL[i];const item=document.createElement('div');item.className='news-item';
    item.innerHTML=`<a href="${n.url}" target="_blank" rel="noopener">${n.title}</a><div class="news-summary">${n.summary}</div><div class="news-source">${n.source}</div>`;
    c.appendChild(item);
  });
}

function updateBriefing(){
  const now=getManilaTime();const h=now.getHours();
  const greeting=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  const localEvents=Object.keys(data.events).length;
  const totalEvents=localEvents+gcalEvents.length;
  const ritualCount=Object.values(data.rituals).filter(Boolean).length;
  const tasks=data.tasks||[];
  const doneTasks=tasks.filter(t=>t.done).length;
  const pendingTasks=tasks.length-doneTasks;
  const hasPriorities=data.priorities.length>0;
  const lines=[];
  const dl=totalEvents===0?'wide open':totalEvents<=2?'light':totalEvents<=5?'structured':'packed';
  lines.push(`${greeting}, JC. ${dl==='wide open'?'Nothing locked in — the day is yours to architect.':dl==='light'?`${totalEvents} commitment${totalEvents!==1?'s':''} on the board. Room to think deeply.`:dl==='structured'?`${totalEvents} blocks on the calendar. Make every one count.`:`${totalEvents} blocks. Protect your decision-making bandwidth.`}`);
  if(ritualCount===0)lines.push('Rituals not started. Choose your first move.');
  else if(ritualCount<4)lines.push(`${ritualCount} of 4 rituals done.${ritualCount>=3?' Nearly locked in.':''}`);
  else lines.push('All 4 rituals complete. Operating at full signal.');
  if(tasks.length===0)lines.push('Task list empty — define what needs to move today.');
  else if(doneTasks===0)lines.push(`${tasks.length} task${tasks.length!==1?'s':''} queued. Start with the highest-leverage item.`);
  else if(pendingTasks===0)lines.push(`All ${tasks.length} tasks cleared. Outstanding execution.`);
  else lines.push(`${doneTasks} of ${tasks.length} tasks done. ${pendingTasks} still live.`);
  if(!hasPriorities)lines.push('Priorities not set. Define your top 3 before the day sets them for you.');
  else lines.push(`Priorities locked: ${data.priorities.join('; ')}.`);
  document.getElementById('briefing').innerHTML=`<div class="briefing-inner">${lines.map(l=>`<div class="b-line">${l}</div>`).join('')}</div>`;
}

function updateClock(){
  const now=getManilaTime();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-US',{timeZone:TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})+' PHT';
  document.getElementById('cal-date').textContent=now.toLocaleDateString('en-US',{timeZone:TZ,weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const dow=now.getDay();const isWE=dow===0||dow===6;
  const badge=document.getElementById('day-badge');
  badge.textContent=isWE?'Weekend':'Weekday';badge.className='day-badge '+(isWE?'weekend':'weekday');
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2500);
}

function init(){
  checkReset();
  if(!data.tasks)data.tasks=[];if(!data.notes)data.notes='';
  if(data.newsIndices&&data.newsIndices.length===4)activeNewsIndices=data.newsIndices;
  else{const s=[...Array(NEWS_POOL.length).keys()].sort(()=>Math.random()-0.5);activeNewsIndices=s.slice(0,4);data.newsIndices=activeNewsIndices;saveData();}
  updateClock();buildPriorities();buildRituals();buildTasks();initNotes();renderNews();
  fetchGcalEvents();
  updateBriefing();
  setInterval(updateClock,1000);
  setInterval(()=>{checkReset();fetchGcalEvents();},5*60*1000);
}
</script>
